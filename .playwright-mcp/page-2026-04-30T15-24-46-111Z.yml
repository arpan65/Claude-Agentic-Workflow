                      - generic [ref=e10259]:
                        - generic [ref=e10262] [cursor=pointer]: Attended Toronto FC vs Columbus Crew at BMO Field during the CNE. Ticket prices showed major inconsistencies across platforms. Arrival was confusing. Uber drop-off had no signs for Gate 3B. Security and staff gave conflicting directions, many with limited English. We were sent through dead ends, the CNE grounds, and food stalls before finding the correct entrance. Walked nearly 1.5 miles. By the time we reached our seats, a goal had already been scored. The overlap between CNE entry and football access created major delays. For a city preparing to host FIFA 2026, clearer signage, better coordination, and multilingual support are urgently needed.
