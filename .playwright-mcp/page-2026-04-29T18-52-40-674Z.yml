            - heading "Planet-smart travel" [level=3] [ref=e89]
            - generic [ref=e90]: Drop the car, travel with us. Increase your mileage and reduce your carbon footprint.
      - separator [ref=e91]
      - generic [ref=e93]:
        - paragraph [ref=e94]: We have made some exciting changes as we have joined together Greyhound and FlixBus.
        - paragraph [ref=e95]: Our customers in Canada can now book both Greyhound and FlixBus rides on the FlixBus website and mobile apps.
        - paragraph [ref=e96]: And we have some new booking features to highlight for you.
        - paragraph [ref=e97]: You no longer need to select a specific location within an arrival or departure city. Simply add the city and we’ll display all the options within that city. And if you want only to see schedules to/from a specific location, you can use our updated filter to narrow down your options.
        - paragraph [ref=e98]: And with both Greyhound and FlixBus schedules, you have more options to choose from than ever before!
        - paragraph [ref=e99]: We’ve also simplified the types of fares we offer by eliminating Economy Extra and Flexible fare types. Now all fares have the same benefits and options which are all listed below.
        - heading "Ticket Changes:" [level=2] [ref=e100]
        - paragraph [ref=e101]:
          - text: One of the most exciting changes (we think so anyway) is a new way to make changes to your ticket.
          - link "Manage My Booking" [ref=e102] [cursor=pointer]:
            - /url: https://shop.flixbus.ca/rebooking/login
          - text: will allow you to change a ticket yourself! No more calling in, no more going to the ticket counter. Log into Manage My Booking, add your confirmation number and email address and you can make changes to your booking or you can even cancel your trip. Depending on the current date and your departure day, fees may apply and you’ll be shown the applicable fee as you look at your options.
        - heading "Seat Reservations:" [level=2] [ref=e103]
        - paragraph [ref=e104]: Like to choose your own seat on the bus or want to make sure you as a group sit next to each other? If you prefer the window seat or a seat near the front of the bus, you can now purchase a seat assignment to make sure you’re exactly where you want to be onboard. If you don’t have a preference, we’ll go ahead and assign a seat for you so that everyone will have a seat assigned before departure. A fee applies when selecting a pre-reserved seat and you’ll be shown the applicable fee based on your selection.
        - paragraph [ref=e105]: Note – once a seat is assigned, you won’t be able to change it (yet.) But, we’re hoping to have this option available to you soon.
        - heading "Baggage:" [level=2] [ref=e106]
        - paragraph [ref=e107]:
          - text: You can still bring one stowed bag and one carry-one for FREE. For customers who need to bring an additional bag or a bulky, oversize bag, your options and any applicable fee is shown when you choose the number and type of bags you want to bring along with you. Baggage can also be added after you booked your ticket using
          - link "Manage My Booking" [ref=e108] [cursor=pointer]:
            - /url: https://shop.flixbus.ca/rebooking/login
          - text: in case you’re having a hard time deciding what to bring with you.
        - heading "A New Ticket:" [level=2] [ref=e109]
        - paragraph [ref=e110]: One ticket type – we’ve made this easier as well. You no longer have to choose if you want a paper ticket or an E-Ticket. We now send you your ticket (as a pdf attached to the email) and you can simply show that to the driver on your phone. Or print it and bring it with you – your choice.
        - heading "Children traveling:" [level=2] [ref=e111]
        - paragraph [ref=e112]: Children age 15 and under can no longer traveling unaccompanied. We make an exception to support our partners at the National Runaway Safeline, the only national transportation and reunification program supporting at-risk youth. Otherwise, all children 15 and under must be accompanied by an adult. And for those customers traveling trans-border, be sure to confirm any and all international travel policies.
        - paragraph [ref=e113]
        - heading "FAQs:" [level=2] [ref=e114]
        - heading "How do I reach customer service?" [level=3] [ref=e115]
        - paragraph [ref=e116]:
          - text: Passengers who booked a trip using the FlixBus website or apps, or are planning to book a trip, can reach customer service
          - link "here" [ref=e117] [cursor=pointer]:
            - /url: https://help.flixbus.com/s/?language=en_CA
          - text: .
        - heading "What does my bus look like?" [level=3] [ref=e118]
        - paragraph [ref=e119]: If you’ve booked a FlixBus ride, these are operated by the typical green FlixBuses or non-branded buses by FlixBus partners. You can still book Greyhound service as well. Those buses will be in the traditional Greyhound blue and grey.
        - heading "Where can I book a ticket and where can I get information on the bus schedule and bus stop?" [level=3] [ref=e120]
        - paragraph [ref=e121]: Passengers can get information and book their ticket for travel on FlixBus or Greyhound either via the FlixBus website or mobile app.
        - paragraph [ref=e122]
