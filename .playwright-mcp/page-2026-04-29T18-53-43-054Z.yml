                          - generic [ref=e1597]: The staff was super friendly and the lunch was delicious! The sights are spectacular, especially the view of the Statue of Liberty. My husband and I were treated to a special shout-out from the DJ on the ship, who played awesome tunes the whole time while giving pauses for some sightseeing info. We were also treated to an amazing desert and champagne in honor of our anniversary. The ship wasn’t crowded at all, so it was easy to get great spots for pictures and privacy to chat. We decided that if we return to NY in the future, we’d definitely book this cruise again, as we liked it so much.
