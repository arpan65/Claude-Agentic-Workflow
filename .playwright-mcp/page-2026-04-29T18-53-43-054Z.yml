                              - generic [ref=e887]: Not worth the money
                          - generic [ref=e888]: Dec 2025
                          - generic [ref=e889]:
                            - generic [ref=e894] [cursor=pointer]:
                              - text: Must read before booking!!
                              - text: Don’t be fooled the outside of the cruise is modern and new, however, the inside is dated and rundown.
                              - text: We booked this for a family of 3 for Christmas Day and set us back £500 ($675). So high quality was definitely expected.
                              - text: I believe there were three levels to the cruise and we had been seated on the first level. We were greeted and seated at a table practically in the hallway entrance of the cruise. For how much this excursion set us back this was totally not okay!
                              - text: We asked the host to move us “somewhere actually inside the boat” and not near the door where people would walk in and out.
                              - text: Bring coats, hats and scarfs. The cruise was uncomfortably cold, and occasionally you would feel the breeze from people going in and out of the door to take pictures.
                              - text: As a family we dress smart for Christmas and a handful of others did but the majority of people were wearing casual clothing… at least they were warm.
                              - text: Drinks are not included in the price of your ticket, and you will be charged at the end of the experience. It was roughly $20 for three colas. Just to give you an idea of the pricing of things.
                              - text: The buffet food was pretty diabolical. I eat with my eyes first and the food looked unappealing and cold.
                              - text: They have a DJ and a small dance floor, however not many people used it and most were sat at their tables uninterested on their phones.
                              - text: There was no other entertainment, on the lower level at least, when games had been advertised.
                              - text: The views were truly beautiful, seeing things like the Statue of Liberty, Brooklyn Bridge and other main attractions.
                              - text: The skyline was stunning, this definitely made the cruise worth it.
                              - text: The staff were lovely and accommodating, I couldn’t fault that.
                              - text: The cruise ride lasted around 2.5 hours, which was plenty of time… maybe even too long.
                              - text: It was definitely an experience. I would highly recommend this excursion if you’re not fussy when it comes to food and want to enjoy the views of NYC from a different perspective.
