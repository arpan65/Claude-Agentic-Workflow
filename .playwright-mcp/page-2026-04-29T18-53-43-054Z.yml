                            - generic [ref=e1356] [cursor=pointer]:
                              - text: Very disappointed with this buffet lunch cruise. Took the cruise on 7/6/25. We arrived early with other passengers. There was no place to sit and wait for the cruise boat to arrive, except stand in the hot July sun. The "buffet" was to say the least, inadequate. I paid $250 for 2 people for this lunch cruise. The selection was limited to chicken, pork and small pieces of salmon, tiny mixed potatoes which were cold and dry. There was pasta and yellow corn which were cold and sticky. Overall, the "hot" buffet was cold, the salad limited to mixed greens and desert was tiny square pieces of cheese cake and pound cake. No mixed fruit as advised in the menu. The servers were friendly and attentive and the views of nyc and statute of liberty never fail to awe. The cruise did not hit all the sites as advertised - did not make it to the Brooklyn Bridge.
                              - text: The music could have been turned down for the lunch and a few umbrellas on the top viewing deck would have made sight seeing a more comfortable and enjoyable experience.
