                  - generic [ref=e1865]: My first time speaking on stage - no sound came out of my mouth. I was terrified. Today, I get paid 10 lakhs/hour to speak at corporate events. I was in Class 7. My teacher signed me up for a poem recitation competition. Going up on stage was my worst fear. The day comes. I walk up to the stage. Feet trembling. Hands shivering. Heart beating fast. I saw my classmates, waiting to pounce on me and mock me the second I made a mistake. I spoke. Pin-drop silence. No applause, but no boos either. I was just relieved it was over. But then my friend asked, "What just happened, Ankur?" "You started talking. Your lips were moving. But there was no sound coming out of your mouth." I swore to never set foot on the stage again. But till date, I have given ~23 TEDx talks. What changed? You get on stage. Make that mistake. Face that fear. Fix those flaws. And get back again. Nobody is born a public speaker. It's a skill. I've created The Ultimate Guide to Effective Communication to help you master all forms of communication - speaking, listening, and writing. Explore the course trusted by 95,000+ students from the link in comments.
