            - generic [ref=e244]: Money Matters is a series where I have conversations with normal people such as you and I, on your personal finance issues. It is important to note that I am NOT a financial expert, I am NOT SEBI registered, and I am NOT qualified to give financial advice. Everything that I say in these videos is purely through my own experiences. - So these videos do not offer any stock tips, or specific mutual fund recommendations or get-rich-quick schemes. - I am not selling any product or service through these videos. - None of the brands that I mention in these videos have paid me to mention them, unless I explicitly say so (and I will say if the video is sponsored). This also means that my advice may not always be the right advice. So incase I make a mistake, the best way to correct me will be to share your point of view in the comments, so that everyone can benefit from it. I am not perfect, nor claiming to be either and would love to learn and grow. The idea is simply to help people with their finance journey and through their story try to help others who may have a similar story.
